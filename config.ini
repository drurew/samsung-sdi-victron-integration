[CAN]
# CAN interface configuration
# Samsung SDI BMS operates at 500 kbps, CAN 2.0A
interface = can0
bitrate = 500000

[Victron]
# Victron D-Bus service configuration
service_name_prefix = com.victronenergy.battery.samsung_sdi
device_instance_start = 280
product_name = Samsung SDI ELPM482-00005
update_interval = 1.0

[Battery]
# Battery specifications
# Capacity in Wh (4.84 kWh for ELPM482-00005)
capacity = 4840.0
chemistry = LiFePO4
number_of_cells = 26
# Default charge/discharge limits (fallback values)
# The driver publishes dynamic limits from the BMS when available.
max_charge_current = 50
max_discharge_current = 50
max_charge_voltage = 54.0
