name: Traffic Analytics

on:
  schedule:
    - cron: '0 6 * * *'  # daily at 06:00 UTC
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TRAFFIC_PAT || secrets.GITHUB_TOKEN }}

      - name: Collect traffic data
        env:
          GH_TOKEN: ${{ secrets.TRAFFIC_PAT || secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date +%Y-%m-%d)
          FILE="analytics/traffic.csv"
          mkdir -p analytics

          # Header if new file
          [ ! -f "$FILE" ] && echo "date,repo,views,unique_views,clones,unique_clones,stars,forks" > "$FILE"

          # All repos owned by drurew
          for repo in $(gh api users/drurew/repos --jq '.[].name' 2>/dev/null); do
            echo "  Collecting $repo..."
            
            views=$(gh api "repos/drurew/$repo/traffic/views" --jq '.count // 0' 2>/dev/null || echo 0)
            uviews=$(gh api "repos/drurew/$repo/traffic/views" --jq '.uniques // 0' 2>/dev/null || echo 0)
            clones=$(gh api "repos/drurew/$repo/traffic/clones" --jq '.count // 0' 2>/dev/null || echo 0)
            uclones=$(gh api "repos/drurew/$repo/traffic/clones" --jq '.uniques // 0' 2>/dev/null || echo 0)
            stars=$(gh api "repos/drurew/$repo" --jq '.stargazers_count // 0' 2>/dev/null || echo 0)
            forks=$(gh api "repos/drurew/$repo" --jq '.forks_count // 0' 2>/dev/null || echo 0)

            echo "$DATE,$repo,$views,$uviews,$clones,$uclones,$stars,$forks" >> "$FILE"
          done

          echo "--- Collected ---"
          cat "$FILE"

      - name: Commit data
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add analytics/traffic.csv
          git diff --cached --quiet || git commit -m "analytics: $(date +%Y-%m-%d)"
          git push
