name: Build and Release

on:
  push:
    branches: [ main ]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update
          sudo apt-get install -y gcc-arm-linux-gnueabihf libc6-dev-armhf-cross libdbus-1-dev:armhf

      - name: Build C driver (ARM)
        run: |
          arm-linux-gnueabihf-gcc -Os -s -std=c99 -Wall -D_GNU_SOURCE \
            -I/usr/include/arm-linux-gnueabihf/dbus-1.0 \
            -I/usr/lib/arm-linux-gnueabihf/dbus-1.0/include \
            -o samsung-sdi-bms src/samsung-sdi-bms.c \
            -L/usr/lib/arm-linux-gnueabihf -lm -ldbus-1
          file samsung-sdi-bms
          ls -la samsung-sdi-bms

      - name: Build and run unit tests
        run: |
          gcc -D_GNU_SOURCE -DUNIT_TEST -Os -Wall -Wextra -std=c99 \
            -o samsung-sdi-bms-test src/samsung-sdi-bms.c
          ./samsung-sdi-bms-test

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Create package
        run: |
          VERSION="$(cat VERSION)"
          OUTPUT_FILE="samsung-sdi-victron-integration-v$VERSION.tar.gz"
          tar --exclude=.git --exclude=.gitignore --exclude='*.tar.gz' \
              -czf "/tmp/$OUTPUT_FILE" .
          mv "/tmp/$OUTPUT_FILE" .
          echo "Created $OUTPUT_FILE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: victron-package
          path: "*.tar.gz"

      - name: Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: "*.tar.gz"
